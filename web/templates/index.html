<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiniLang IDE</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css" />
  <link rel="stylesheet" href="/static/css/style.css?v=2" />
</head>
<body>
  <header class="header">
    <div class="brand">
      <h1>MiniLang IDE</h1>
      <p>直接编写 · 编译 · 运行 · 支持 string[i]、len()、数组栈、input、write</p>
    </div>
    <div class="toolbar">
      <button id="newBtn" class="btn">新建</button>
      <button id="saveBtn" class="btn">保存</button>
      <select id="exampleSelect" title="可选：加载参考示例">
        <option value="">— 参考示例 —</option>
      </select>
      <label class="chk"><input type="checkbox" id="optCheck" checked /> 优化</label>
      <button id="compileBtn" class="btn">编译</button>
      <button id="runBtn" class="btn primary">编译并运行</button>
    </div>
  </header>

  <main class="layout">
    <section class="panel editor-panel">
      <div class="panel-head">
        <span>源代码 — workspace/main.ml</span>
        <span id="cursorPos" class="muted"></span>
      </div>
      <textarea id="sourceEditor"></textarea>
      <div class="stdin-bar">
        <label for="stdinInput">运行输入（每行对应一次 <code>input</code>，从上到下）：</label>
        <textarea id="stdinInput" rows="3" placeholder="例如括号匹配程序输入一行：&#10;{[()]}"></textarea>
      </div>
    </section>

    <section class="panel diag-panel">
      <div class="panel-head">
        <span>错误 / 警告</span>
        <span id="diagSummary" class="muted">0 错误 / 0 警告</span>
      </div>
      <div id="errorList" class="error-list"></div>
    </section>

    <section class="panel output-panel">
      <div class="tabs" id="outputTabs">
        <button class="tab" data-tab="run">运行输出</button>
        <button class="tab" data-tab="code">目标代码</button>
        <button class="tab" data-tab="tokens">Token</button>
        <button class="tab" data-tab="tac">中间代码</button>
        <button class="tab" data-tab="opt">优化后</button>
        <button class="tab" data-tab="files">输出文件</button>
        <button class="tab" data-tab="stages">阶段</button>
      </div>
      <pre id="outputArea" class="output-area"></pre>
    </section>
  </main>

  <footer class="footer">
    <span>Ctrl+Enter 编译并运行 · Ctrl+S 保存 · write() 输出到 workspace/output/</span>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/clike/clike.min.js"></script>
  <script src="/static/js/app.js?v=2"></script>
</body>
</html>
